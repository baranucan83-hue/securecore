<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureCore Chat FIX</title>

<style>
  *{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,Arial,sans-serif;
background:linear-gradient(135deg,#0b1220,#111827,#0f172a);
height:100vh;
overflow:hidden;
color:#fff;
}

.app{
height:100vh;
display:flex;
flex-direction:column;
}

.login-screen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-card{
width:100%;
max-width:430px;
padding:35px;
border-radius:28px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
box-shadow:0 20px 50px rgba(0,0,0,.4);
position:relative;
overflow:hidden;
}

.login-glow{
position:absolute;
width:300px;
height:300px;
right:-120px;
top:-120px;
background:#00d4ff;
filter:blur(120px);
opacity:.18;
border-radius:50%;
}

.logo-circle{
width:90px;
height:90px;
margin:auto;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
font-weight:bold;
background:linear-gradient(135deg,#00d4ff,#00ffa3);
color:#07131d;
margin-bottom:20px;
}

.login-header{
text-align:center;
margin-bottom:30px;
}

.login-header h1{
font-size:34px;
margin-bottom:8px;
}

.login-header p{
opacity:.7;
}

.login-form{
display:flex;
flex-direction:column;
gap:14px;
}

.login-form input,
.search,
#room,
#msg{
padding:15px;
border-radius:14px;
border:none;
outline:none;
background:rgba(255,255,255,.05);
color:#fff;
}

.login-btn,
.sidebar button,
.message-box button{
padding:15px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#00d4ff,#00ffa3);
font-weight:bold;
cursor:pointer;
transition:.25s;
}

.login-btn:hover,
.sidebar button:hover,
.message-box button:hover{
transform:translateY(-2px);
}

.topbar{
height:80px;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 30px;
background:rgba(255,255,255,.04);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,.08);
}

.brand{
display:flex;
align-items:center;
gap:15px;
}

.brand-icon{
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:#00d4ff;
color:#08131d;
font-weight:bold;
}

.content{
flex:1;
display:flex;
overflow:hidden;
}

.sidebar{
width:270px;
padding:20px;
background:rgba(255,255,255,.04);
border-right:1px solid rgba(255,255,255,.06);
display:flex;
flex-direction:column;
gap:15px;
}

.menu{
margin-top:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.menu div{
padding:14px;
border-radius:12px;
background:rgba(255,255,255,.04);
cursor:pointer;
transition:.25s;
}

.menu div:hover{
background:rgba(255,255,255,.08);
}

.chat-panel{
flex:1;
display:flex;
flex-direction:column;
padding:20px;
}

#chat{
flex:1;
overflow:auto;
padding-right:10px;
}

.msg{
max-width:75%;
padding:14px;
margin:10px 0;
background:#1d4ed8;
border-radius:16px;
animation:fade .25s;
}

.message-box{
display:flex;
gap:10px;
margin-top:15px;
}

.message-box input{
flex:1;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>
<body>

<div class="app">

    <!-- LOGIN -->

    <div id="loginBox" class="login-screen">

        <div class="login-card">

            <div class="login-glow"></div>

            <div class="login-header">

                <div class="logo-circle">S</div>

                <h1>SecureCore</h1>

                <p>Private • Secure • Fast</p>

            </div>

            <div class="login-form">

                <label>Email</label>

                <input
                    id="email"
                    type="email"
                    placeholder="ornek@email.com">

                <label>Şifre</label>

                <input
                    id="password"
                    type="password"
                    placeholder="Şifrenizi girin">

                <button class="login-btn" onclick="login()">
                    Giriş Yap
                </button>

            </div>

            <div class="login-footer">

                <span>🔒 Güvenli</span>

                <span>⚡ Firebase</span>

            </div>

        </div>

    </div>

    <!-- CHAT -->

    <div id="appBox" style="display:none;">

        <header class="topbar">

            <div class="brand">

                <div class="brand-icon">S</div>

                <div>

                    <h2>SecureCore</h2>

                    <small>Secure Messaging Platform</small>

                </div>

            </div>

            <input
                class="search"
                placeholder="Sohbet Ara...">

        </header>

        <div class="content">

            <aside class="sidebar">

                <h3>Odalar</h3>

                <input
                    id="room"
                    placeholder="Oda Adı">

                <button onclick="joinRoom()">
                    Odaya Gir
                </button>

                <div class="menu">

                    <div>💬 Genel</div>
                    <div>⭐ Favoriler</div>
                    <div>📁 Dosyalar</div>
                    <div>⚙ Ayarlar</div>

                </div>

            </aside>

            <main class="chat-panel">

                <div id="chat"></div>

                <div class="message-box">

                    <button>😊</button>

                    <input
                        id="msg"
                        placeholder="Mesaj yaz...">

                    <button onclick="sendMsg()">
                        Gönder
                    </button>

                </div>

            </main>

        </div>

    </div>

</div>

</body>

</body>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyB9hBRTJ4BLMLpmAPxwPdbrNbk2UuAV3i4",
  authDomain: "core-chat-3be96.firebaseapp.com",
  databaseURL: "https://core-chat-3be96-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "core-chat-3be96",
  storageBucket: "core-chat-3be96.appspot.com",
  messagingSenderId: "555994455959",
  appId: "1:555994455959:web:9dbd659b1970c491042ed2"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

/* 🔥 ELEMENTLERİ GARANTİ AL */
const emailEl = document.getElementById("email");
const passEl = document.getElementById("password");
const roomEl = document.getElementById("room");
const msgEl = document.getElementById("msg");
const chatEl = document.getElementById("chat");

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(emailEl.value, passEl.value)
  .then(()=>{
    loginBox.style.display="none";
    appBox.style.display="flex";
  })
  .catch(e=>alert(e.message));
}

/* ROOM */
let currentRoom = null;

function joinRoom(){
  if(!roomEl.value) return alert("Oda gir!");

  chatEl.innerHTML="";
  currentRoom = roomEl.value;

  db.ref("rooms/"+currentRoom).off();

  db.ref("rooms/"+currentRoom).on("child_added", snap=>{
    const d = snap.val();

    const div = document.createElement("div");
    div.className="msg";

    div.innerHTML=`
      <b>${d.user}</b><br>
      ${d.text}<br>
      <small>${new Date(d.time).toLocaleString()}</small>
    `;

    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
  });
}

/* SEND */
function sendMsg(){
  if(!currentRoom) return alert("Önce odaya gir!");
  if(!msgEl.value) return;

  db.ref("rooms/"+currentRoom).push({
    text: msgEl.value,
    user: auth.currentUser.email,
    time: Date.now()
  });

  msgEl.value="";
}

</script>

</body>
</html>
