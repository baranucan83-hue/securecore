


<!DOCTYPE html>
<html>
<head>
  <title>SecureCore</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      color:white;
      text-align:center;
      padding:20px;
    }

    input,button{
      padding:10px;
      margin:5px;
      border-radius:8px;
      border:none;
    }

    button{background:#00c6ff;color:white;cursor:pointer}

    #chat{
      margin-top:20px;
      max-width:500px;
      margin-left:auto;
      margin-right:auto;
      text-align:left;
      background:rgba(0,0,0,0.3);
      padding:10px;
      border-radius:10px;
      height:250px;
      overflow:auto;
    }

    .msg{
      margin:5px 0;
      padding:5px;
      border-bottom:1px solid rgba(255,255,255,0.2);
    }
  </style>
</head>

<body>

<h1>SecureCore 🔐💬</h1>

<!-- ANAHTAR -->
<h3>Anahtar Sistemi</h3>
<input id="secretKey" placeholder="Gizli anahtar">
<button onclick="loadKey()">Anahtarı Yükle</button>
<p id="status"></p>

<hr>

<!-- MESAJ -->
<h3>Mesaj Gönder</h3>
<input id="msg" placeholder="Mesaj yaz">
<button onclick="sendMsg()">Gönder</button>

<div id="chat"></div>

<script>

let cryptoKey = null;
let messages = [];

/* HASH -> AES KEY */
async function sha256(data){
  const enc = new TextEncoder().encode(data);
  const hash = await crypto.subtle.digest("SHA-256", enc);
  return hash;
}

async function loadKey(){
  const secret = document.getElementById("secretKey").value;

  if(!secret){
    alert("Anahtar gir!");
    return;
  }

  const keyMaterial = await sha256(secret);

  cryptoKey = await crypto.subtle.importKey(
    "raw",
    keyMaterial,
    "AES-GCM",
    false,
    ["encrypt","decrypt"]
  );

  document.getElementById("status").innerText = "✔ Anahtar aktif!";
}

/* MESAJ ŞİFRELE */
async function encrypt(text){
  const iv = crypto.getRandomValues(new Uint8Array(12));

  const enc = new TextEncoder().encode(text);

  const encrypted = await crypto.subtle.encrypt(
    {name:"AES-GCM", iv},
    cryptoKey,
    enc
  );

  const full = new Uint8Array(iv.length + encrypted.byteLength);
  full.set(iv);
  full.set(new Uint8Array(encrypted), iv.length);

  return btoa(String.fromCharCode(...full));
}

/* MESAJ ÇÖZ */
async function decrypt(data){
  const bytes = Uint8Array.from(atob(data), c => c.charCodeAt(0));

  const iv = bytes.slice(0,12);
  const msg = bytes.slice(12);

  const dec = await crypto.subtle.decrypt(
    {name:"AES-GCM", iv},
    cryptoKey,
    msg
  );

  return new TextDecoder().decode(dec);
}

/* MESAJ GÖNDER */
async function sendMsg(){
  if(!cryptoKey){
    alert("Önce anahtar yükle!");
    return;
  }

  const text = document.getElementById("msg").value;
  if(!text) return;

  const encrypted = await encrypt(text);

  messages.push(encrypted);
  renderChat();
}

/* CHAT GÖSTER */
async function renderChat(){
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  for(let m of messages){
    let text;

    try{
      text = await decrypt(m);
    }catch(e){
      text = "❌ çözülemedi";
    }

    chat.innerHTML += `<div class="msg">💬 ${text}</div>`;
  }
}

</script>

</body>
</html>
