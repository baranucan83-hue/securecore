<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureCore Chat FIX</title>

<style>
  *{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:
radial-gradient(circle at top,#23395d 0%,#0b1220 45%,#05070d 100%);
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
position:relative;
}

body::before{
content:"";
position:fixed;
inset:0;
background-image:
radial-gradient(#ffffff 1px,transparent 1px),
radial-gradient(#67dfff .8px,transparent .8px);
background-size:90px 90px,160px 160px;
opacity:.25;
animation:stars 50s linear infinite;
pointer-events:none;
}

@keyframes stars{
from{transform:translateY(0);}
to{transform:translateY(100px);}
}

.container{
width:95%;
max-width:850px;
height:94vh;
padding:20px;
display:flex;
flex-direction:column;
background:rgba(18,24,38,.55);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.08);
border-radius:28px;
box-shadow:0 0 50px rgba(0,255,255,.15);
position:relative;
overflow:hidden;
}

.container::after{
content:"";
position:absolute;
right:-100px;
top:-70px;
width:260px;
height:260px;
border-radius:50%;
background:radial-gradient(circle,#8bdcff,#3066d6,#07101e);
filter:blur(2px);
opacity:.8;
}

h1{
text-align:center;
font-size:34px;
margin-bottom:20px;
font-weight:300;
letter-spacing:2px;
color:#cfe8ff;
}

input{
width:100%;
padding:14px;
margin:8px 0;
border:none;
outline:none;
border-radius:16px;
background:rgba(255,255,255,.05);
border:1px solid rgba(0,255,170,.18);
color:#fff;
font-size:15px;
}

input::placeholder{
color:#9cb0c7;
}

button{
padding:14px;
margin-top:10px;
border:none;
border-radius:16px;
background:#37f29b;
color:#04150d;
font-weight:bold;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 0 25px #37f29b;
}

#chat{
flex:1;
margin:18px 0;
padding:15px;
overflow:auto;
border-radius:20px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
}

#chat::-webkit-scrollbar{
width:6px;
}

#chat::-webkit-scrollbar-thumb{
background:#37f29b;
border-radius:20px;
}

.msg{
padding:14px;
margin-bottom:12px;
border-radius:16px;
background:rgba(255,255,255,.05);
border-left:4px solid #37f29b;
animation:fade .4s;
}

.msg b{
color:#8fe8ff;
}

.msg small{
display:block;
margin-top:8px;
opacity:.6;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(12px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<div class="container">
<h1>SecureCore Chat 💬</h1>

<div id="loginBox">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Şifre">
  <button onclick="login()">Giriş Yap</button>
</div>

<div id="appBox" style="display:none;flex:1;flex-direction:column;">
  <input id="room" placeholder="Oda adı">
  <button onclick="joinRoom()">Odaya Gir</button>

  <div id="chat"></div>

  <input id="msg" placeholder="Mesaj">
  <button onclick="sendMsg()">Gönder</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyB9hBRTJ4BLMLpmAPxwPdbrNbk2UuAV3i4",
  authDomain: "core-chat-3be96.firebaseapp.com",
  databaseURL: "https://core-chat-3be96-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "core-chat-3be96",
  storageBucket: "core-chat-3be96.appspot.com",
  messagingSenderId: "555994455959",
  appId: "1:555994455959:web:9dbd659b1970c491042ed2"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

/* 🔥 ELEMENTLERİ GARANTİ AL */
const emailEl = document.getElementById("email");
const passEl = document.getElementById("password");
const roomEl = document.getElementById("room");
const msgEl = document.getElementById("msg");
const chatEl = document.getElementById("chat");

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(emailEl.value, passEl.value)
  .then(()=>{
    loginBox.style.display="none";
    appBox.style.display="flex";
  })
  .catch(e=>alert(e.message));
}

/* ROOM */
let currentRoom = null;

function joinRoom(){
  if(!roomEl.value) return alert("Oda gir!");

  chatEl.innerHTML="";
  currentRoom = roomEl.value;

  db.ref("rooms/"+currentRoom).off();

  db.ref("rooms/"+currentRoom).on("child_added", snap=>{
    const d = snap.val();

    const div = document.createElement("div");
    div.className="msg";

    div.innerHTML=`
      <b>${d.user}</b><br>
      ${d.text}<br>
      <small>${new Date(d.time).toLocaleString()}</small>
    `;

    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
  });
}

/* SEND */
function sendMsg(){
  if(!currentRoom) return alert("Önce odaya gir!");
  if(!msgEl.value) return;

  db.ref("rooms/"+currentRoom).push({
    text: msgEl.value,
    user: auth.currentUser.email,
    time: Date.now()
  });

  msgEl.value="";
}

</script>

</body>
</html>
